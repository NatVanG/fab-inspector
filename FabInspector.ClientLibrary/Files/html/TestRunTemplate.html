<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fab Inspector - Test Run</title>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js" integrity="sha384-Ft/vb48LwsAEtgltj7o+6vtS2esTU9PCpDqcXs4OCVQFZu5BqprHtUCZ4kjK+bpE" crossorigin="anonymous"></script>

    <!-- json2html -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/json2html/2.2.3/json2html.min.js" integrity="sha384-BNP6wA28/vQ24ZrRplF30+uBUS9HEHDlZw8YbqzYeJNc9qZ+t1qS+SY2XftU37+N" crossorigin="anonymous"></script>

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">

    <!--
    <link rel="icon" href="../icon/pbiinspector.png">
        -->

    <style>
        .bd-placeholder-img {
            font-size: 1.125rem;
            text-anchor: middle;
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none;
        }

        .filter-grid {
            display: grid;
            gap: 0.75rem;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        @media (max-width: 991.98px) {
            .filter-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="bg-body-tertiary">

    <main class="container">
        <div class="d-flex align-items-center p-3 my-3 rounded shadow-sm">
            <img class="me-3" src="%LOGO%" alt="Fab Inspector logo" width="64" height="64">
            <div class="lh-1">
                <h1 class="h6 mb-0 text-gray-dark lh-1">%VERSION% | Test Run</h1>
            </div>
        </div>

        <div class="row g-3">
            <!-- Header -->
            <div class="col-12 col-lg-7">
                <div id="header" class="my-3 p-3 bg-body rounded shadow-sm h-100">
                    <h6 class="border-bottom pb-2 mb-0">Header</h6>
                    <div id="headerContent"></div>
                </div>
            </div>

            <!-- Filters -->
            <div class="col-12 col-lg-5">
                <div id="filters" class="my-3 p-3 bg-body rounded shadow-sm h-100">
                    <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                        <h6 class="mb-0">Filters</h6>
                        <button id="clearFilters" type="button" class="btn btn-sm btn-outline-secondary">Clear</button>
                    </div>

                    <form id="resultFilters" class="filter-grid" autocomplete="off">
                        <div>
                            <label for="filterRuleName" class="form-label small mb-1">Rule Name</label>
                            <input id="filterRuleName" name="ruleName" type="search" class="form-control form-control-sm" placeholder="Contains...">
                        </div>

                        <div>
                            <label for="filterLogType" class="form-label small mb-1">Log Type</label>
                            <select id="filterLogType" name="logType" class="form-select form-select-sm">
                                <option value="any" selected>Any</option>
                                <option value="warning">Warning</option>
                                <option value="error">Error</option>
                            </select>
                        </div>

                        <div>
                            <label for="filterRuleItemType" class="form-label small mb-1">Rule Item Type</label>
                            <input id="filterRuleItemType" name="ruleItemType" type="search" class="form-control form-control-sm" placeholder="Contains...">
                        </div>

                        <div>
                            <label for="filterItemPath" class="form-label small mb-1">Item Path</label>
                            <input id="filterItemPath" name="itemPath" type="search" class="form-control form-control-sm" placeholder="Contains...">
                        </div>

                        <div>
                            <label for="filterParentDisplayName" class="form-label small mb-1">Parent Display Name</label>
                            <input id="filterParentDisplayName" name="parentDisplayName" type="search" class="form-control form-control-sm" placeholder="Contains...">
                        </div>

                        <div>
                            <label for="filterPass" class="form-label small mb-1">Pass</label>
                            <select id="filterPass" name="pass" class="form-select form-select-sm">
                                <option value="any" selected>Any</option>
                                <option value="true">Pass</option>
                                <option value="false">Fail</option>
                            </select>
                        </div>
                    </form>

                    <div class="small text-body-secondary pt-3" id="filterSummary"></div>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div id="results" class="my-3 p-3 bg-body rounded shadow-sm">
            <h6 class="border-bottom pb-2 mb-0">Results</h6>
            <div id="resultsList"></div>
        </div>
    </main>

    <script>

        //Data that we want to render
        let testRunData = %JSON%

        const testRunHeaderTemplate = {
            "<>": "div",
            "html": [
                {
                    "<>": "div",
                    "class": "d-flex text-body-secondary pt-3",
                    "html": [
                        {
                            "<>": "p",
                            "class": "pb-3 mb-0 small lh-sm",
                            "html": [{ "<>": "strong", "class": "d-block text-gray-dark", "text": "Test Run ID" }, { "text": "${Id}" }]
                        }
                    ]
                },
                {
                    "<>": "div",
                    "class": "d-flex text-body-secondary pt-3",
                    "html": [
                        {
                            "<>": "p",
                            "class": "pb-3 mb-0 small lh-sm",
                            "html": [{ "<>": "strong", "class": "d-block text-gray-dark", "text": "Time" }, { "text": "${CompletionTime}" }]
                        }
                    ]
                },
                {
                    "<>": "div",
                    "class": "d-flex text-body-secondary pt-3",
                    "html": [
                        {
                            "<>": "p",
                            "class": "pb-3 mb-0 small lh-sm",
                            "html": [{ "<>": "strong", "class": "d-block text-gray-dark", "text": "Tested File Path" }, { "text": "${TestedFilePath}" }]
                        }
                    ]
                },
                {
                    "<>": "div",
                    "class": "d-flex text-body-secondary pt-3",
                    "html": [
                        {
                            "<>": "p",
                            "class": "pb-3 mb-0 small lh-sm",
                            "html": [{ "<>": "strong", "class": "d-block text-gray-dark", "text": "Rules File Path" }, { "text": "${RulesFilePath}" }]
                        }
                    ]
                },

                {
                    "<>": "div",
                    "class": "d-flex text-body-secondary pt-3",
                    "html": [
                        {
                            "<>": "p",
                            "class": "pb-3 mb-0 small lh-sm",
                            "html": [{ "<>": "strong", "class": "d-block text-gray-dark", "text": "Verbose" }, { "text": "${Verbose}" }]
                        }
                    ]
                },
                {
                    "<>": "div",
                    "class": "d-flex text-body-secondary pt-3",
                    "html": [
                        {
                            "<>": "p",
                            "class": "pb-3 mb-0 small lh-sm",
                            "html": [{ "<>": "strong", "class": "d-block text-gray-dark", "text": "Results stats" }, { "text": function () { if (this.Results != null) { return "Results count: " + this.Results.length } else { return "No results were found."} } }]
                        }
                    ]
                }
            ]
        };

        const testRunResultTemplate = {
            "<>": "div",
            "html": [
                {
                    "<>": "div",
                    "class": "d-flex text-body-secondary pt-3",
                    "html": [
                        {
                            "<>": "svg",
                            "class": "bd-placeholder-img flex-shrink-0 me-2 rounded",
                            "width": 32,
                            "height": 32,
                            "xmlns": "http://www.w3.org/2000/svg",
                            "role": "img",
                            "aria-label": "Placeholder: 32x32",
                            "preserveAspectRatio": "xMidYMid slice",
                            "focusable": false,
                            "html": [
                                {
                                    "<>": "rect",
                                    "width": "100%",
                                    "height": "100%",
                                    "fill": function () {
                                        if (this.Pass) { return "#0cbaf4" } else { if (this.LogType === 1) { return "#eda413" } else { return "#ed135d" } }
                                    }
                                }
                            ]
                        },
                        {
                            "<>": "div",
                            "class": "pb-3 mb-0 small lh-sm border-bottom w-100",
                            "html": [
                                {
                                    "<>": "div",
                                    "class": "d-flex justify-content-between",
                                    "html": [
                                        {
                                            "<>": "span",
                                            "html": [
                                                {
                                                    "<>": "p",
                                                    "class": "pb-3 mb-0 small lh-sm",
                                                    "html": [
                                                        {
                                                            "<>": "strong",
                                                            "class": "d-block text-gray-dark",
                                                            "text": "Rule"
                                                        },
                                                        {
                                                            "text": "${RuleName}"
                                                        }
                                                    ]
                                                },
                                                {
                                                    "<>": "p",
                                                    "class": "pb-3 mb-0 small lh-sm",
                                                    "html": [
                                                        {
                                                            "<>": "strong",
                                                            "class": "d-block text-gray-dark",
                                                            "text": "Rule Description"
                                                        },
                                                        {
                                                            "text": "${RuleDescription}"
                                                        }
                                                    ]
                                                },
                                                {
                                                    "<>": "p",
                                                    "class": "pb-3 mb-0 small lh-sm",
                                                    "html": [
                                                        {
                                                            "<>": "strong",
                                                            "class": "d-block text-gray-dark",
                                                            "text": "Rule Log Type"
                                                        },
                                                        {
                                                            "text": function () {
                                                                if (this.LogType === 1) { return "Warning" } else { return "Error" }
                                                            }
                                                        }
                                                    ]
                                                },
                                                {
                                                    "<>": "p",
                                                    "class": "pb-3 mb-0 small lh-sm",
                                                    "html": [
                                                        {
                                                            "<>": "strong",
                                                            "class": "d-block text-gray-dark",
                                                            "text": "Rule Item Type"
                                                        },
                                                        {
                                                            "text": "${RuleItemType}"
                                                        }
                                                    ]
                                                },
                                                {
                                                    "<>": "p",
                                                    "class": "pb-3 mb-0 small lh-sm",
                                                    "html": [
                                                        {
                                                            "<>": "strong",
                                                            "class": "d-block text-gray-dark",
                                                            "text": "Fabric Item Path"
                                                        },
                                                        {
                                                            "text": "${ItemPath}"
                                                        }
                                                    ]
                                                },
                                                {
                                                    "<>": "p",
                                                    "class": "pb-3 mb-0 small lh-sm",
                                                    "html": [
                                                        {
                                                            "<>": "strong",
                                                            "class": "d-block text-gray-dark",
                                                            "text": "Page"
                                                        },
                                                        {
                                                            "text": "${ParentDisplayName}"
                                                        }
                                                    ]
                                                },
                                                {
                                                    "<>": "p",
                                                    "class": "pb-3 mb-0 small lh-sm",
                                                    "html": [
                                                        {
                                                            "<>": "strong",
                                                            "class": "d-block text-gray-dark",
                                                            "text": "Pass"
                                                        },
                                                        {
                                                            "text": "${Pass}"
                                                        }
                                                    ]
                                                },
                                                {
                                                    "<>": "p",
                                                    "class": "pb-3 mb-0 small lh-sm",
                                                    "html": [
                                                        {
                                                            "<>": "strong",
                                                            "class": "d-block text-gray-dark",
                                                            "text": "Message"
                                                        },
                                                        {
                                                            "text": "${Message}"
                                                        }
                                                    ]
                                                }
                                            ]
                                }, { "<>": "img", "src": function () { if (this.ParentName != null) { return "PBIInspectorPNG\\" + this.Id + ".png" } else { return "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAABGdBTUEAALGPC/xhBQAAAAlwSFlzAAAOwgAADsIBFShKgAAAAAxJREFUGFdj+P//PwAF/gL+pzWBhAAAAABJRU5ErkJggg==" } }, "alt": "Page wireframe", "width": function () { if (this.ParentName != null) { return "65%" } else { return "1%" } }, "height": function () { if (this.ParentName != null) { return "65%" } else { return "1%" } } }
                                    ]
                                }
                            ]
                        }
                    ]
                }], "obj": function () { return (this.Results) }
        };

        const allResults = Array.isArray(testRunData.Results) ? testRunData.Results : [];

        function normalizeText(value) {
            if (value == null) {
                return "";
            }

            return String(value).toLowerCase().trim();
        }

        function parseBoolean(value) {
            if (typeof value === "boolean") {
                return value;
            }

            const text = normalizeText(value);

            if (text === "true" || text === "1" || text === "yes") {
                return true;
            }

            if (text === "false" || text === "0" || text === "no") {
                return false;
            }

            return null;
        }

        function matchesContains(sourceValue, expectedValue) {
            if (!expectedValue) {
                return true;
            }

            return normalizeText(sourceValue).includes(expectedValue);
        }

        function getActiveFilters() {
            return {
                ruleName: normalizeText($("#filterRuleName").val()),
                logType: $("#filterLogType").val(),
                ruleItemType: normalizeText($("#filterRuleItemType").val()),
                itemPath: normalizeText($("#filterItemPath").val()),
                parentDisplayName: normalizeText($("#filterParentDisplayName").val()),
                pass: $("#filterPass").val()
            };
        }

        function matchLogType(item, filterLogType) {
            if (filterLogType === "any") {
                return true;
            }

            const normalizedLogType = normalizeText(item.LogType);
            const isWarning = item.LogType === 1 || normalizedLogType === "1" || normalizedLogType === "warning";
            const isError = item.LogType === 2 || normalizedLogType === "2" || normalizedLogType === "error";

            if (filterLogType === "warning") {
                return isWarning;
            }

            if (filterLogType === "error") {
                return isError;
            }

            return true;
        }

        function matchPass(item, filterPass) {
            if (filterPass === "any") {
                return true;
            }

            const passValue = parseBoolean(item.Pass);

            if (filterPass === "true") {
                return passValue === true;
            }

            if (filterPass === "false") {
                return passValue === false;
            }

            return true;
        }

        function renderResults(results) {
            const dataForResults = Object.assign({}, testRunData, { Results: results });
            $("#resultsList").empty().json2html(dataForResults, testRunResultTemplate);
        }

        function updateSummary(filteredCount, totalCount) {
            $("#filterSummary").text("Showing " + filteredCount + " of " + totalCount + " results.");
        }

        function applyFilters() {
            const filters = getActiveFilters();

            const filteredResults = allResults.filter(function (item) {
                return matchesContains(item.RuleName, filters.ruleName)
                    && matchLogType(item, filters.logType)
                    && matchesContains(item.RuleItemType, filters.ruleItemType)
                    && matchesContains(item.ItemPath, filters.itemPath)
                    && matchesContains(item.ParentDisplayName, filters.parentDisplayName)
                    && matchPass(item, filters.pass);
            });

            renderResults(filteredResults);
            updateSummary(filteredResults.length, allResults.length);
        }

        function clearFilters() {
            $("#resultFilters")[0].reset();
            applyFilters();
        }

        // Initial render
        $("#headerContent").json2html(testRunData, testRunHeaderTemplate);
        applyFilters();

        // Wire up filter interactions
        $("#resultFilters").on("input change", "input, select", applyFilters);
        $("#clearFilters").on("click", clearFilters);
    </script>
</body>
</html>
