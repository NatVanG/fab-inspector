name: Build and Publish Docker Image

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      action:
        description: Select whether to publish a prerelease image or promote an existing image to latest
        required: true
        default: publish-prerelease
        type: choice
        options:
          - publish-prerelease
          - promote-latest
      source_tag:
        description: Existing image tag to promote when action is promote-latest
        required: false
        default: prerelease
        type: string

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/natvang/fab-inspector

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate promote source tag
        if: ${{ inputs.action == 'promote-latest' }}
        run: |
          if [ -z "${{ inputs.source_tag }}" ]; then
            echo "source_tag is required when promoting an image to latest." >&2
            exit 1
          fi

      - name: Build and push prerelease Docker image
        if: ${{ inputs.action == 'publish-prerelease' }}
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          docker buildx build \
            -f FabInspector.CLI/Dockerfile \
            --push \
            -t ${IMAGE_NAME}:prerelease \
            -t ${IMAGE_NAME}:sha-${SHORT_SHA} \
            .

      - name: Promote existing image to latest
        if: ${{ inputs.action == 'promote-latest' }}
        run: |
          docker buildx imagetools create \
            --tag ${IMAGE_NAME}:latest \
            ${IMAGE_NAME}:${{ inputs.source_tag }}